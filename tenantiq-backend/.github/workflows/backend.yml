name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check for syntax errors
        run: node -e "require('./server.js')" &
        env:
          PORT: 5000
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          JWT_ACCESS_SECRET: test_secret
          JWT_REFRESH_SECRET: test_secret
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_EXPIRES: 7d
          CLIENT_URL: http://localhost:5173